name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true
        type: string

env:
  RENDER_SERVICE_ID: ${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment intent
        if: github.event.inputs.confirm != 'deploy-production'
        run: |
          echo "❌ Deployment cancelled. You must type 'deploy-production' to confirm."
          exit 1

      - name: Confirm branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ Production deploys are only allowed from the main branch."
          exit 1

  test:
    name: Run Tests
    needs: validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bayanihan_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, sockets
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP Dependencies
        run: composer install --no-interaction --no-progress

      - name: Cache Node Dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Node Dependencies
        run: npm ci

      - name: Copy Environment Variables
        run: cp .env.example .env && php artisan key:generate

      - name: Build Frontend Assets
        run: npm run build

      - name: Run Backend Tests
        run: composer test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: bayanihan_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Frontend Tests
        run: npm run test:run

  deploy:
    name: Deploy to Render (Production)
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "🚀 Deploying to production..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys" \
            -H "accept: application/json" \
            -H "authorization: Bearer ${{ env.RENDER_API_KEY }}" \
            -H "content-type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Deployment triggered successfully"
            echo "$BODY" | jq .
          else
            echo "❌ Deployment failed with HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

      - name: Health Gate — wait for /up
        run: |
          echo "⏳ Waiting for production to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/up 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production responding at /up (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/12: /up returned $STATUS — waiting 15s..."
            sleep 15
          done
          echo "❌ Production failed to respond at /up after 12 attempts"
          exit 1

      - name: Notify Deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🚀 PRODUCTION deployment ${{ job.status }}
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
