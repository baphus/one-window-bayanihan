; ---------------------------------------------------------------------------
; One Window Bayanihan - PHP overrides for local development
; ---------------------------------------------------------------------------
; PHP's stock defaults (post_max_size=8M, upload_max_filesize=2M) are far
; smaller than the application's own validation rules, which allow file
; uploads up to 10MB each (see StoreReferralRequest / ReferralController).
;
; When a referral is submitted with several supporting documents the combined
; multipart body easily exceeds 8M, so PHP rejects the request inside the
; ValidatePostSize middleware *before* Laravel can run validation. The browser
; then sees an opaque "PostTooLargeException / Content Too Large" error.
;
; These overrides raise the limits so legitimate uploads succeed while still
; capping the total payload to a sane size. They are loaded by the local dev
; server via the PHP_INI_SCAN_DIR variable wired into `composer run dev`.
;
; NOTE: production (php-fpm) limits are set separately in the Dockerfile.
; ---------------------------------------------------------------------------

; Max size of the entire POST body (must be >= upload_max_filesize and large
; enough to hold several attachments plus the form fields).
post_max_size = 64M

; Max size of a single uploaded file. Kept >= the app's 10MB (max:10240) rule
; with a little headroom for multipart encoding overhead.
upload_max_filesize = 12M

; Allow several requirement documents to be attached in one referral.
max_file_uploads = 30

; Give large uploads room to finish on slower local connections.
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
