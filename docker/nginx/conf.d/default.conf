# Rate limiting zone — 10MB shared memory zone, 100 requests per minute per real client IP
limit_req_zone $binary_remote_addr zone=app:10m rate=100r/m;

# Restore real client IP from X-Forwarded-For, trusting Sevalla's load balancer.
# The LB sits in the private Docker network, so we trust common private ranges.
# Laravel already trusts all proxies (trustProxies at: '*') in bootstrap/app.php.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    # Security headers (CSP omitted — handled by Laravel middleware for flexibility)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Static assets — immutable cache for versioned build files
    location /build/ {
        alias /var/www/html/public/build/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon / robots
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Static files
    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|eot|ttf|otf)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM (local — same container)
    location / {
        limit_req zone=app burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
        include fastcgi_params;

        # Laravel trusted proxies — trust the platform load balancer
        # $http_x_forwarded_proto preserves the LB's original header; falls back to $scheme
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
        fastcgi_param HTTPS on;
    }

    # Deny hidden files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive directories
    location ~ ^/(?:app|bootstrap|config|database|resources|routes|vendor) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}
