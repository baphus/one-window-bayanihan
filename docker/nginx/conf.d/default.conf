server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Let Vite's HMR / dev server handle itself when using APP_DEBUG or INERTIA_SSR
    # For production builds, location ~* \.(?:js|css|map)$ handles static assets from public/build/

    # Static assets — immutable cache for versioned build files
    location /build/ {
        alias /var/www/html/public/build/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon / robots
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Static files
    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|eot|ttf|otf)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri @php =404;
    }

    # PHP-FPM
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        include fastcgi_params;

        # Laravel trusted proxies — trust nginx
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
    }

    # Deny hidden files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive directories
    location ~ ^/(?:app|bootstrap|config|database|resources|routes|vendor) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}
