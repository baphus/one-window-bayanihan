[PHP]
; ── Limits ──
max_execution_time = 60
max_input_time = 60
max_input_vars = 3000
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 64M

; ── Error handling ──
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED

; ── File uploads ──
file_uploads = On
; S3 client may need allow_url_fopen=On. Test before production deploy.
allow_url_fopen = Off

; ── Date ──
date.timezone = Asia/Manila

; ── OPCache ──
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 300
opcache.fast_shutdown = 1
opcache.validate_timestamps = 0
opcache.jit = tracing
opcache.jit_buffer_size = 100M

; ── Session ──
session.gc_divisor = 1000
session.gc_probability = 1
session.gc_maxlifetime = 720
session.sid_length = 48
session.use_strict_mode = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"

; ── Security ──
expose_php = Off

; ── Disable dangerous shell-execution functions ──
; proc_open and friends are NOT disabled — Symfony Process (queue worker, scheduler) requires them.
disable_functions = pcntl_exec, exec, system, shell_exec, passthru, popen

; ── Restrict PHP file access to project files ──
open_basedir = /var/www/html:/dev/stdin:/dev/stdout:/dev/stderr:/tmp

; ── PCNTL (required for queue worker / scheduler) ──
; pcntl is enabled at compile time; no ini settings needed
