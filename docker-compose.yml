# ============================================================================
# One Window Bayanihan — Docker Compose
#
# USAGE:
#   Build and start:        docker compose up -d
#   Run migrations:         docker compose exec app php artisan migrate
#   Seed database:          docker compose exec app php artisan db:seed
#   View logs:              docker compose logs -f
#   Rebuild after changes:  docker compose build --no-cache app
#
# PRODUCTION:
#   Set .env with your production values (Supabase, Storage, Pusher, etc.)
#   Run: docker compose up -d
#   The local PostgreSQL can be disabled by setting DB_HOST to your Supabase host
# ============================================================================

services:
  # ── Nginx Web Server ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-80}:80"
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      # Nginx configuration
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Custom entrypoint for envsubst support
      - ./docker/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  # ── PHP-FPM Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-one_window}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - CACHE_STORE=${CACHE_STORE:-database}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - FILESYSTEM_DISK=supabase
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - FOWNER
      - SETGID
      - SETUID
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://nginx/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  # ── Queue Worker ──────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-one_window}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - CACHE_STORE=${CACHE_STORE:-database}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - FILESYSTEM_DISK=supabase
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - FOWNER
      - SETGID
      - SETUID
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    command: php artisan queue:listen --tries=3 --timeout=90
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  # ── Scheduler ─────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-one_window}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - CACHE_STORE=${CACHE_STORE:-database}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - FILESYSTEM_DISK=supabase
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - FOWNER
      - SETGID
      - SETUID
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    command: php artisan schedule:work
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  # ── Migration Runner (one-shot, profile-based) ───────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-one_window}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - CACHE_STORE=${CACHE_STORE:-database}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - FILESYSTEM_DISK=supabase
    depends_on:
      db:
        condition: service_healthy
    command: php artisan migrate --force --no-interaction
    networks:
      - app-network
    profiles:
      - migrate
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  # For local development. In production, point DB_HOST to your Supabase host.
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-one_window}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    # ports:
    #   - "${DB_EXPOSE_PORT:-5432}:5432"  # exposed only when DB_EXPOSE_PORT is explicitly set
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-one_window}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Optional — required only if CACHE_STORE, QUEUE_CONNECTION, or SESSION_DRIVER
  # are set to "redis". By default this app uses database drivers.
  redis:
    image: redis:7-alpine
    # ports:
    #   - "${REDIS_EXPOSE_PORT:-6379}:6379"  # exposed only when REDIS_EXPOSE_PORT is explicitly set
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
